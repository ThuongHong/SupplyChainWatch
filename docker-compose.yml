services:
  postgres:
    image: timescale/timescaledb-ha:pg15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-globalsupplywatch}
      POSTGRES_USER: ${POSTGRES_USER:-globalsupplywatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-globalsupplywatch}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-globalsupplywatch} -d ${POSTGRES_DB:-globalsupplywatch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      LLM_MODEL_FAST: ${LLM_MODEL_FAST:-qwen3.6-flash}
      LLM_MODEL_FAST_FALLBACKS: ${LLM_MODEL_FAST_FALLBACKS:-qwen3.5-flash,qwen3.6-flash-2026-04-16,qwen3.5-flash-2026-02-23}
      LLM_MODEL_REASONING: ${LLM_MODEL_REASONING:-deepseek-v4-flash}
      LLM_MODEL_REASONING_FALLBACKS: ${LLM_MODEL_REASONING_FALLBACKS:-qwen3.6-flash,qwen3.6-flash-2026-04-16,qwen3.5-flash,qwen3.5-flash-2026-02-23}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_TIMEOUT_FAST: ${LLM_TIMEOUT_FAST:-30}
      LLM_TIMEOUT_REASONING: ${LLM_TIMEOUT_REASONING:-60}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    env_file: .env
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      LLM_MODEL_FAST: ${LLM_MODEL_FAST:-qwen3.6-flash}
      LLM_MODEL_FAST_FALLBACKS: ${LLM_MODEL_FAST_FALLBACKS:-qwen3.5-flash,qwen3.6-flash-2026-04-16,qwen3.5-flash-2026-02-23}
      LLM_MODEL_REASONING: ${LLM_MODEL_REASONING:-deepseek-v4-flash}
      LLM_MODEL_REASONING_FALLBACKS: ${LLM_MODEL_REASONING_FALLBACKS:-qwen3.6-flash,qwen3.6-flash-2026-04-16,qwen3.5-flash,qwen3.5-flash-2026-02-23}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_TIMEOUT_FAST: ${LLM_TIMEOUT_FAST:-30}
      LLM_TIMEOUT_REASONING: ${LLM_TIMEOUT_REASONING:-60}
    command: celery -A app.tasks.celery_app worker --loglevel=INFO
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_started

  beat:
    build:
      context: ./backend
    env_file: .env
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      LLM_MODEL_FAST: ${LLM_MODEL_FAST:-qwen3.6-flash}
      LLM_MODEL_FAST_FALLBACKS: ${LLM_MODEL_FAST_FALLBACKS:-qwen3.5-flash,qwen3.6-flash-2026-04-16,qwen3.5-flash-2026-02-23}
      LLM_MODEL_REASONING: ${LLM_MODEL_REASONING:-deepseek-v4-flash}
      LLM_MODEL_REASONING_FALLBACKS: ${LLM_MODEL_REASONING_FALLBACKS:-qwen3.6-flash,qwen3.6-flash-2026-04-16,qwen3.5-flash,qwen3.5-flash-2026-02-23}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_TIMEOUT_FAST: ${LLM_TIMEOUT_FAST:-30}
      LLM_TIMEOUT_REASONING: ${LLM_TIMEOUT_REASONING:-60}
    command: celery -A app.tasks.celery_app beat --loglevel=INFO
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_started

  flower:
    build:
      context: ./backend
    env_file: .env
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      LLM_MODEL_FAST: ${LLM_MODEL_FAST:-qwen3.6-flash}
      LLM_MODEL_FAST_FALLBACKS: ${LLM_MODEL_FAST_FALLBACKS:-qwen3.5-flash,qwen3.6-flash-2026-04-16,qwen3.5-flash-2026-02-23}
      LLM_MODEL_REASONING: ${LLM_MODEL_REASONING:-deepseek-v4-flash}
      LLM_MODEL_REASONING_FALLBACKS: ${LLM_MODEL_REASONING_FALLBACKS:-qwen3.6-flash,qwen3.6-flash-2026-04-16,qwen3.5-flash,qwen3.5-flash-2026-02-23}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_TIMEOUT_FAST: ${LLM_TIMEOUT_FAST:-30}
      LLM_TIMEOUT_REASONING: ${LLM_TIMEOUT_REASONING:-60}
    command: celery -A app.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
